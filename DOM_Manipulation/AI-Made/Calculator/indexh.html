<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Premium Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="description"
        content="A sleek, modern, and highly responsive calculator with a premium glassmorphism design.">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="calculator-container">
        <div class="calculator">
            <div class="display">
                <div id="previous-operand" class="previous-operand"></div>
                <div id="current-operand" class="current-operand">0</div>
            </div>
            <div class="buttons">
                <button id="clear" class="btn span-two accent-red" data-all-clear>AC</button>
                <button id="delete" class="btn accent-orange" data-delete>DEL</button>
                <button class="btn accent-blue" data-operator="/">÷</button>

                <button class="btn" data-number="7">7</button>
                <button class="btn" data-number="8">8</button>
                <button class="btn" data-number="9">9</button>
                <button class="btn accent-blue" data-operator="*">×</button>

                <button class="btn" data-number="4">4</button>
                <button class="btn" data-number="5">5</button>
                <button class="btn" data-number="6">6</button>
                <button class="btn accent-blue" data-operator="-">−</button>

                <button class="btn" data-number="1">1</button>
                <button class="btn" data-number="2">2</button>
                <button class="btn" data-number="3">3</button>
                <button class="btn accent-blue" data-operator="+">+</button>

                <button class="btn" data-number=".">.</button>
                <button class="btn" data-number="0">0</button>
                <button id="equals" class="btn span-two accent-green" data-equals>=</button>
            </div>
        </div>
    </main>

    <script src="js.js"></script>
</body>

</html>
