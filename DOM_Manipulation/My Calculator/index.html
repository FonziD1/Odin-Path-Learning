<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="css.css">
</head>

<body>
    <h1 class="name">My Simple Calculator</h1>
    <div id="calculator-container">
        <div id="display">0</div>
        <div id="buttons">
            <button id="clear" class="button">AC</button>
            <button id="divide" class="button">/</button>
            <button id="multiply" class="button">*</button>
            <button id="subtract" class="button">-</button>
            <button id="add" class="button">+</button>
            <button id="equals" class="button">=</button>
            <button id="decimal" value="." class="button">.</button>
            <button id="percent" class="button">%</button>
            <button id="nine" value="9" class="button digit">9</button>
            <button id="eight" value="8" class="button digit">8</button>
            <button id="seven" value="7" class="button digit">7</button>
            <button id="six" value="6" class="button digit">6</button>
            <button id="five" value="5" class="button digit">5</button>
            <button id="four" value="4" class="button digit">4</button>
            <button id="three" value="3" class="button digit">3</button>
            <button id="two" value="2" class="button digit">2</button>
            <button id="one" value="1" class="button digit">1</button>
            <button id="zero" value="0" class="button digit">0</button>

        </div>
    </div>
    <script src="js.js"></script>
</body>

</html>
